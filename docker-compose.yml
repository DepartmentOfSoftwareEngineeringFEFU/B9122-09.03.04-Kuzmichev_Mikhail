services:
  postgres:
    image: postgres:16-alpine
    container_name: learning-analytics-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-learning_analytics}
      POSTGRES_USER: ${POSTGRES_USER:-learning_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-learning_password}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-learning_user} -d ${POSTGRES_DB:-learning_analytics}
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: learning-analytics-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-Learning Analytics API}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-learning_analytics}
      POSTGRES_USER: ${POSTGRES_USER:-learning_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-learning_password}
      SEED_ON_STARTUP: ${SEED_ON_STARTUP:-true}
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: learning-analytics-frontend
    depends_on:
      - backend
    ports:
      - "4200:80"
    restart: unless-stopped

volumes:
  postgres_data:
